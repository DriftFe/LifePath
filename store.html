<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake Store</title>
  <style>
    body {
      background: #181818;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    h1 {
      margin-top: 32px;
      font-size: 2.2rem;
      color: #ffd700;
      letter-spacing: 2px;
    }
    #balance {
      margin: 18px 0;
      font-size: 1.3rem;
      color: #00ff99;
    }
    #navslot {
      margin-bottom: 16px;
      color: #ffd700;
      background: #222;
      border: 2px solid #ffd700;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      display: inline-block;
    }
    #navslot:hover {
      background: #ffd700;
      color: #222;
    }
    #store {
      display:flex;
      flex-wrap:wrap;
      gap:24px;
      justify-content:center;
      margin-bottom:32px;
      margin-top:10px;
      width:100%;
      max-width:900px;
    }
    .product-card {
      background: #222;
      border-radius: 10px;
      box-shadow: 0 2px 8px #0008;
      padding: 18px 20px;
      min-width: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1 1 160px;
      max-width: 180px;
    }
    .product-card .emoji {
      font-size:2.5rem;
    }
    .product-card .name {
      font-weight:bold;
      margin-bottom:4px;
      text-align:center;
    }
    .product-card .price {
      color:#ffd700;
      margin-bottom:8px;
    }
    .product-card button {
      padding: 6px 14px;
      border-radius: 5px;
      border: none;
      background: #00ff99;
      color: #181818;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .product-card button:hover {
      background: #00cc77;
    }
    #storeMessage {
      min-height:2em;
      text-align:center;
      color:#00ff99;
      font-size:1.1rem;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <h1>Fake Store</h1>
  <div id="balance">Balance: $0</div>
  <a id="navslot" href="index.html">Back to Slot 🎰</a>
  <div id="store"></div>
  <div id="storeMessage"></div>
  <script src="store.js"></script>
</body>
</html>
